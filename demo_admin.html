<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>PlanetLogin — White-label studio</title>
<meta name="description" content="Brand your PlanetLogin portal visually — colors, logo, providers — preview it live, and export the config or .env. No code.">
<meta name="robots" content="noindex, follow">
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<style>
  @font-face{font-family:'Inter';src:url('fonts/inter-var.woff2') format('woff2-variations');font-weight:100 900;font-display:swap}
  :root{--bg:#070b16;--surface:#0d1422;--surface-2:#131c2e;--accent:#f6a13c;--ink:#231400;--text:#eef2fb;--muted:#9aa7bd;--line:rgba(255,255,255,.12)}
  *{box-sizing:border-box} html,body{height:100%;margin:0}
  /* full-height app on desktop: no document scrollbar (only the inner panes scroll) */
  @media(min-width:901px){body{overflow:hidden}}
  body{background:var(--bg);color:var(--text);font-family:'Inter',system-ui,sans-serif;-webkit-font-smoothing:antialiased}
  a{color:var(--accent)}
  header{display:flex;align-items:center;gap:14px;height:56px;padding:0 20px;border-bottom:1px solid var(--line);background:rgba(7,11,22,.7);backdrop-filter:blur(8px)}
  .brand{display:flex;align-items:center;gap:9px;font-weight:700;text-decoration:none;color:var(--text)} .brand img{width:24px}
  header .sp{flex:1} header .tag{color:var(--muted);font-size:.85rem} header a.l{color:var(--muted);text-decoration:none;font-size:.88rem;margin-left:16px}
  .grid{display:grid;grid-template-columns:340px 1fr;height:calc(100vh - 60px)}
  /* controls */
  .controls{overflow:auto;border-right:1px solid var(--line);padding:18px 18px 60px}
  .sec{margin-bottom:22px}
  .sec h3{font-size:.78rem;letter-spacing:1.3px;text-transform:uppercase;color:var(--accent);margin:0 0 12px}
  .row{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:11px;font-size:.9rem}
  .row label{color:var(--text)} .row .hint{color:var(--muted);font-size:.75rem}
  input[type=text],input[type=url],input[type=number]{background:var(--surface-2);border:1px solid var(--line);border-radius:8px;color:var(--text);padding:.4rem .55rem;font-size:.85rem;width:160px}
  input[type=number]{width:90px}
  input[type=color]{width:38px;height:28px;border:1px solid var(--line);border-radius:6px;background:none;padding:0;cursor:pointer}
  select{background:var(--surface-2);border:1px solid var(--line);border-radius:8px;color:var(--text);padding:.35rem .5rem;font-size:.85rem}
  /* toggle */
  .sw{position:relative;width:38px;height:22px;flex:none}
  .sw input{opacity:0;width:0;height:0} .sw span{position:absolute;inset:0;background:var(--surface-2);border:1px solid var(--line);border-radius:999px;transition:.15s;cursor:pointer}
  .sw span::before{content:'';position:absolute;width:16px;height:16px;left:2px;top:2px;background:var(--muted);border-radius:50%;transition:.15s}
  .sw input:checked+span{background:var(--accent);border-color:transparent} .sw input:checked+span::before{transform:translateX(16px);background:var(--ink)}
  /* preview */
  .preview{position:relative;display:flex;flex-direction:column;min-width:0}
  .stage{flex:1;display:flex;min-height:0}
  #globe-wrap{flex:1 1 auto;min-width:0}
  planet-login{display:block;width:100%;height:100%}
  .lpanel{flex:0 0 340px;max-width:46%;background:var(--pv-surface,#0d1422);border-left:1px solid var(--line);display:grid;place-items:center;padding:1.6rem}
  .lcard{width:100%;max-width:290px}
  .lbrand{display:flex;align-items:center;gap:9px;margin-bottom:1.2rem;font-weight:700;font-size:1.1rem}
  .lbrand img{width:26px;height:26px;border-radius:6px}
  .lfield{margin-bottom:.7rem} .lfield label{display:block;font-size:.74rem;color:var(--muted);margin-bottom:.25rem}
  .lfield input{width:100%;background:var(--surface-2);border:1px solid var(--line);border-radius:9px;padding:.5rem .6rem;color:var(--text);font-size:.9rem}
  .lbtn{width:100%;border:0;border-radius:10px;padding:.6rem;font-weight:700;cursor:default;margin-top:.5rem}
  .ldiv{display:flex;align-items:center;gap:.6rem;color:var(--muted);font-size:.72rem;margin:.9rem 0}.ldiv::before,.ldiv::after{content:'';flex:1;height:1px;background:var(--line)}
  .lsocial{display:flex;flex-direction:column;gap:.45rem}
  .lsoc{border:1px solid var(--line);background:var(--surface-2);color:var(--text);border-radius:10px;padding:.5rem;font-size:.85rem;font-weight:600;text-align:center}
  /* export */
  .export{border-top:1px solid var(--line);background:#05080f;max-height:38%;display:flex;flex-direction:column}
  .tabs{display:flex;gap:6px;padding:10px 14px 0}
  .tabs button{background:var(--surface-2);border:1px solid var(--line);color:var(--muted);border-radius:8px 8px 0 0;padding:.35rem .8rem;font-weight:600;font-size:.82rem;cursor:pointer;border-bottom:0}
  .tabs button.on{background:#05080f;color:var(--text)}
  .tabs .sp{flex:1} .copy{background:var(--accent);color:var(--ink);border:0;border-radius:8px;padding:.35rem .8rem;font-weight:700;font-size:.8rem;cursor:pointer;align-self:center}
  pre.out{margin:0;padding:12px 16px;overflow:auto;font-size:.78rem;line-height:1.5;font-family:ui-monospace,Menlo,monospace;color:#cdd8f0}
  @media(max-width:900px){.grid{grid-template-columns:1fr;height:auto}.controls{border-right:0;border-bottom:1px solid var(--line)}.stage{height:60vh}}

  /* --- thin, overlay-style scrollbars (kept visible — accessibility-safe) --- */
  *{scrollbar-width:thin;scrollbar-color:rgba(255,255,255,.22) transparent}
  ::-webkit-scrollbar{width:9px;height:9px}
  ::-webkit-scrollbar-track{background:transparent}
  ::-webkit-scrollbar-thumb{background:rgba(255,255,255,.16);border-radius:8px;border:2px solid transparent;background-clip:padding-box}
  ::-webkit-scrollbar-thumb:hover{background:rgba(255,255,255,.32);background-clip:padding-box}

  /* --- planetlogin.org shared top nav (identical on every page) --- */
  .pl-header{display:block;height:auto;padding:0;position:sticky;top:0;z-index:100;background:rgba(7,11,22,.72);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);border-bottom:1px solid var(--line)}
  .pl-nav{display:flex;align-items:center;gap:16px;height:60px;max-width:1080px;margin:0 auto;padding:0 24px}
  .pl-nav .pl-brand{display:flex;align-items:center;gap:10px;font-weight:700;font-size:1.05rem;text-decoration:none;color:var(--text)}
  .pl-nav .pl-brand img{width:26px;height:26px}
  .pl-nav .pl-sp{flex:1}
  .pl-nav a.pl-link{color:var(--muted);text-decoration:none;font-size:.92rem;font-weight:500}
  .pl-nav a.pl-link:hover{color:var(--text)}
  .pl-nav .pl-btn{display:inline-flex;align-items:center;gap:8px;border-radius:11px;padding:.5rem .9rem;font-weight:600;font-size:.9rem;text-decoration:none;border:1px solid var(--line);color:var(--text)}
  .pl-nav .pl-btn:hover{border-color:var(--muted)}
  .pl-nav .pl-btn.primary{background:var(--accent);color:#231400;border:0}
  @media(max-width:760px){.pl-nav a.pl-link{display:none}}
</style>
</head>
<body>
<header class="pl-header">
  <nav class="pl-nav">
    <a class="pl-brand" href="/"><img src="/favicon.svg" alt="">PlanetLogin</a>
    <span class="pl-sp"></span>
    <a class="pl-link" href="/#features">Features</a>
    <a class="pl-link" href="/#core">Auth service</a>
    <a class="pl-link" href="/demo.html">Live demo</a>
    <a class="pl-link" href="/whitepaper.html">Whitepaper</a>
    <a class="pl-link" href="/demo_admin.html">Studio</a>
    <a class="pl-link" href="https://www.npmjs.com/package/@planetlogin/planetlogin" target="_blank" rel="noopener">npm</a>
    <a class="pl-btn primary" href="https://github.com/planetlogin/planetlogin" target="_blank" rel="noopener">GitHub</a>
  </nav>
</header>

<div class="grid">
  <!-- CONTROLS -->
  <div class="controls">
    <div class="sec">
      <h3>Brand</h3>
      <div class="row"><label>Name</label><input type="text" id="c-name" value="Acme"></div>
      <div class="row"><label>Accent</label><input type="color" id="c-accent" value="#f6a13c"></div>
      <div class="row"><label>Background</label><input type="color" id="c-bg" value="#0d1422"></div>
      <div class="row"><label>Logo URL</label><input type="url" id="c-logo" placeholder="https://…"></div>
    </div>
    <div class="sec">
      <h3>Providers</h3>
      <div class="row"><label>Email + password</label><label class="sw"><input type="checkbox" id="p-password" checked><span></span></label></div>
      <div class="row"><label>↳ allow register</label><label class="sw"><input type="checkbox" id="p-register"><span></span></label></div>
      <div class="row"><label>Google</label><label class="sw"><input type="checkbox" id="p-google" checked><span></span></label></div>
      <div class="row"><label>GitHub</label><label class="sw"><input type="checkbox" id="p-github"><span></span></label></div>
      <div class="row"><label>Apple</label><label class="sw"><input type="checkbox" id="p-apple"><span></span></label></div>
      <div class="row"><label>Magic link</label><label class="sw"><input type="checkbox" id="p-magic"><span></span></label></div>
      <div class="row"><label>Passkeys</label><label class="sw"><input type="checkbox" id="p-passkeys" checked><span></span></label></div>
      <div class="row"><label>2FA (TOTP)</label><label class="sw"><input type="checkbox" id="p-totp"><span></span></label></div>
      <div class="row"><label>Anonymous <span class="hint">guest · no account</span></label><label class="sw"><input type="checkbox" id="p-anon"><span></span></label></div>
    </div>
    <div class="sec">
      <h3>Layout</h3>
      <div class="row"><label>Globe position</label>
        <select id="l-pos"><option value="left">left</option><option value="right">right</option><option value="full">full</option></select></div>
      <div class="row"><label>Search box</label><label class="sw"><input type="checkbox" id="l-search" checked><span></span></label></div>
      <div class="row"><label>Auto-spin</label><label class="sw"><input type="checkbox" id="l-spin" checked><span></span></label></div>
    </div>
    <div class="sec">
      <h3>Locale memory</h3>
      <div class="row"><label>Remember on device <span class="hint">Tier 0 · no backend · live →</span></label><label class="sw"><input type="checkbox" id="m-remember"><span></span></label></div>
      <div class="row"><label>↳ fly to saved on load</label><label class="sw"><input type="checkbox" id="m-flysaved"><span></span></label></div>
      <div class="row"><label>Persist to account <span class="hint">Tier 2 · needs a backend</span></label><label class="sw"><input type="checkbox" id="m-persist"><span></span></label></div>
      <div class="row"><label>↳ fly to account on login</label><label class="sw"><input type="checkbox" id="m-flylogin"><span></span></label></div>
    </div>
    <div class="sec">
      <h3>Security</h3>
      <div class="row"><label>Token algorithm</label>
        <select id="s-alg"><option value="EdDSA">EdDSA</option><option value="RS256">RS256</option><option value="ES256">ES256</option><option value="HS256">HS256</option></select></div>
      <div class="row"><label>Encrypt token <span class="hint">JWE · confidential claims</span></label><label class="sw"><input type="checkbox" id="s-encrypt"><span></span></label></div>
      <div class="row"><label>Session store <span class="hint">redis = scale</span></label>
        <select id="s-store"><option value="none">none</option><option value="memory">memory</option><option value="redis">redis</option></select></div>
      <div class="row"><label>Login rate limit <span class="hint">per 5 min · blank = off</span></label><input type="number" id="s-rl" min="1" placeholder="off"></div>
      <div class="row"><label>CORS origins <span class="hint">comma-separated</span></label><input type="text" id="s-cors" placeholder="https://app.acme.com"></div>
    </div>
  </div>

  <!-- PREVIEW + EXPORT -->
  <div class="preview">
    <div class="stage" id="stage">
      <div id="globe-wrap"></div>
      <aside class="lpanel" id="lpanel">
        <div class="lcard">
          <div class="lbrand"><img id="pv-logo" src="/favicon.svg" alt=""><span id="pv-name">Acme</span></div>
          <div id="pv-pwd">
            <div class="lfield"><label>Email</label><input type="email" placeholder="you@email.com" disabled></div>
            <div class="lfield"><label>Password</label><input type="password" placeholder="••••••••" disabled></div>
            <button class="lbtn" id="pv-cta">Sign in</button>
          </div>
          <div id="pv-social-wrap">
            <div class="ldiv" id="pv-div">or</div>
            <div class="lsocial" id="pv-social"></div>
          </div>
        </div>
      </aside>
    </div>
    <div class="export">
      <div class="tabs">
        <button class="on" data-t="json">config.json</button>
        <button data-t="env">.env</button>
        <span class="sp"></span>
        <button class="copy" id="copy">Copy</button>
      </div>
      <pre class="out" id="out"></pre>
    </div>
  </div>
</div>

<script type="module" src="./planetlogin.js"></script>
<script>
  const $ = (id) => document.getElementById(id);
  let tab = 'json';

  function readConfig() {
    const oauth = [];
    if ($('p-google').checked) oauth.push({ id: 'google', clientIdEnv: 'PLANETLOGIN_OAUTH_GOOGLE_CLIENT_ID' });
    if ($('p-github').checked) oauth.push({ id: 'github', clientIdEnv: 'PLANETLOGIN_OAUTH_GITHUB_CLIENT_ID' });
    if ($('p-apple').checked)  oauth.push({ id: 'apple',  clientIdEnv: 'PLANETLOGIN_OAUTH_APPLE_CLIENT_ID' });
    const c = {
      spec: 1,
      brand: { name: $('c-name').value || 'Acme', accent: $('c-accent').value, background: $('c-bg').value },
      providers: {
        password: { enabled: $('p-password').checked, allowRegister: $('p-register').checked },
        oauth,
        magicLink: { enabled: $('p-magic').checked },
        passkeys: { enabled: $('p-passkeys').checked },
        totp: { enabled: $('p-totp').checked },
        anonymous: { enabled: $('p-anon').checked },
      },
      layout: { globePosition: $('l-pos').value, showSearch: $('l-search').checked, autoSpin: $('l-spin').checked },
    };
    if ($('c-logo').value) c.brand.logoUrl = $('c-logo').value;
    // Account-bound locale memory (Tier 2) — only emit when a gate is on.
    const locale = {};
    if ($('m-persist').checked) locale.persist = true;
    if ($('m-flylogin').checked) locale.flyToOnLogin = true;
    if (Object.keys(locale).length) c.locale = locale;
    // Token: algorithm (non-default) + optional JWE encryption.
    const token = {};
    if ($('s-alg').value !== 'EdDSA') token.algorithm = $('s-alg').value;
    if ($('s-encrypt').checked) token.encrypt = true;
    if (Object.keys(token).length) c.token = token;
    // Session store — only emit when not the stateless default.
    if ($('s-store').value !== 'none') c.session = { store: $('s-store').value };
    // Security: CORS allowlist + login rate limit.
    const security = {};
    const cors = $('s-cors').value.split(',').map(s => s.trim()).filter(Boolean);
    if (cors.length) security.cors = { origins: cors };
    const rl = parseInt($('s-rl').value, 10);
    if (rl > 0) security.rateLimit = { login: { limit: rl, windowSeconds: 300 } };
    if (Object.keys(security).length) c.security = security;
    return c;
  }

  function toEnv(c) {
    const alg = c.token?.algorithm || 'EdDSA';
    const lines = [
      'PLANETLOGIN_BASE_URL=https://login.' + (c.brand.name || 'app').toLowerCase().replace(/[^a-z0-9]/g,'') + '.com',
      "PLANETLOGIN_CONFIG='" + JSON.stringify(c) + "'",
      'PLANETLOGIN_DOWNSTREAM_URL=https://api.example.com/identity',
      'PLANETLOGIN_DOWNSTREAM_SECRET=change-me',
    ];
    if (alg !== 'EdDSA') lines.push(`PLANETLOGIN_JWT_ALG=${alg}`);
    // HS256 is symmetric (shared secret, no JWKS); the rest use an asymmetric PEM.
    lines.push(alg === 'HS256'
      ? 'PLANETLOGIN_JWT_SECRET=/run/secrets/planetlogin_hs256.key'
      : 'PLANETLOGIN_JWT_PRIVATE_KEY=/run/secrets/planetlogin_signing.pem');
    if (c.token?.encrypt) lines.push('PLANETLOGIN_JWT_ENCRYPT=true', 'PLANETLOGIN_JWE_KEY=…  # npx planetlogin-keygen --jwe');
    if (c.session?.store) lines.push(`PLANETLOGIN_SESSION_STORE=${c.session.store}`);
    if (c.security?.rateLimit?.login) lines.push(`PLANETLOGIN_RATELIMIT_LOGIN_LIMIT=${c.security.rateLimit.login.limit}`);
    if (c.security?.cors?.origins?.length) lines.push('PLANETLOGIN_CORS_ORIGINS=' + c.security.cors.origins.join(','));
    for (const o of c.providers.oauth) {
      const u = o.id.toUpperCase();
      lines.push(`PLANETLOGIN_OAUTH_${u}_CLIENT_ID=…`, `PLANETLOGIN_OAUTH_${u}_CLIENT_SECRET=…`);
    }
    return lines.join('\n');
  }

  let globe; // recreate to apply accent live
  function renderGlobe(c) {
    const wrap = $('globe-wrap');
    if (c.layout.globePosition === 'right') $('stage').style.flexDirection = 'row-reverse';
    else $('stage').style.flexDirection = 'row';
    $('lpanel').style.display = c.layout.globePosition === 'full' ? 'none' : '';
    wrap.innerHTML = '';
    globe = document.createElement('planet-login');
    globe.setAttribute('data-url', './countries-110m.json');
    globe.setAttribute('accent', c.brand.accent);
    globe.setAttribute('search', String(c.layout.showSearch));
    globe.setAttribute('autospin', String(c.layout.autoSpin));
    // Tier 0 device memory — globe attributes (not config). Live in the preview:
    // pick a place, toggle on, and it flies back there on the next reload.
    if ($('m-remember').checked) globe.setAttribute('remember', '');
    if ($('m-flysaved').checked) globe.setAttribute('fly-to-saved', '');
    wrap.appendChild(globe);
  }

  function renderPanel(c) {
    document.documentElement.style.setProperty('--accent', c.brand.accent);
    $('lpanel').style.setProperty('--pv-surface', c.brand.background);
    $('pv-name').textContent = c.brand.name || 'Acme';
    $('pv-logo').src = c.brand.logoUrl || '/favicon.svg';
    $('pv-pwd').style.display = c.providers.password.enabled ? '' : 'none';
    $('pv-cta').style.background = c.brand.accent; $('pv-cta').style.color = '#231400';
    $('pv-cta').textContent = c.providers.password.allowRegister ? 'Sign in / up' : 'Sign in';
    const social = [];
    for (const o of c.providers.oauth) social.push(`Continue with ${o.id[0].toUpperCase()+o.id.slice(1)}`);
    if (c.providers.magicLink.enabled) social.push('Email me a magic link');
    if (c.providers.passkeys.enabled) social.push('Use a passkey');
    if (c.providers.anonymous?.enabled) social.push('Continue as guest');
    $('pv-social').innerHTML = social.map(s => `<div class="lsoc">${s}</div>`).join('');
    const hasSocial = social.length > 0;
    $('pv-social-wrap').style.display = hasSocial ? '' : 'none';
    $('pv-div').style.display = (hasSocial && c.providers.password.enabled) ? '' : 'none';
  }

  function renderExport(c) {
    $('out').textContent = tab === 'json' ? JSON.stringify(c, null, 2) : toEnv(c);
  }

  let globeTimer;
  function update(globeToo) {
    const c = readConfig();
    renderPanel(c);
    renderExport(c);
    if (globeToo) { clearTimeout(globeTimer); globeTimer = setTimeout(() => renderGlobe(c), 120); }
  }

  // wire controls: accent/layout changes recreate the globe; others just repaint
  document.querySelectorAll('input,select').forEach((el) => {
    const heavy = ['c-accent','l-pos','l-search','l-spin','m-remember','m-flysaved'].includes(el.id);
    el.addEventListener('input', () => update(heavy));
  });
  document.querySelectorAll('.tabs button[data-t]').forEach((b) => b.addEventListener('click', () => {
    document.querySelectorAll('.tabs button[data-t]').forEach(x => x.classList.remove('on'));
    b.classList.add('on'); tab = b.dataset.t; renderExport(readConfig());
  }));
  $('copy').addEventListener('click', () => {
    navigator.clipboard.writeText($('out').textContent); $('copy').textContent = 'Copied'; setTimeout(()=>$('copy').textContent='Copy', 1200);
  });

  // initial
  renderGlobe(readConfig());
  update(false);
</script>
</body>
</html>
