# Build & publish the ready-to-run portal image (the SvelteKit flavor) to GHCR —
# what makes deploy-your-own truly 1-click:
#
#   docker run ghcr.io/planetlogin/portal -e PLANETLOGIN_CONFIG=... (see DEPLOY.md)
#
# `latest` tracks main; version tags come from `portal-v*` git tags. The image is
# the subdomain build (PLANETLOGIN_BASE=""); path-mount users build their own with
# --build-arg PLANETLOGIN_BASE=/auth.
name: Portal image

on:
  push:
    branches: [main]
    paths: ['flavors/svelte/**', '.github/workflows/portal-image.yml']
    tags: ['portal-v*']
  workflow_dispatch:

jobs:
  image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ghcr.io/planetlogin/portal
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=match,pattern=portal-v(.*),group=1
      - uses: docker/build-push-action@v6
        with:
          context: flavors/svelte
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
