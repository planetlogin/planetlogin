<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>PlanetLogin — vanilla example</title>
  <style>
    body { margin: 0; background: #070b16; color: #eef2fb; font: 16px/1.5 system-ui, sans-serif; }
    main { max-width: 720px; margin: 0 auto; padding: 24px; }
    planet-login { display: block; width: 100%; height: 480px; border-radius: 16px; overflow: hidden; }
    pre { background: rgba(255,255,255,.06); padding: 12px 16px; border-radius: 10px; }
  </style>
</head>
<body>
  <main>
    <h1>Sign in with a planet</h1>
    <planet-login accent="#f6a13c"></planet-login>
    <p>Pick a place — the detected locale appears below:</p>
    <pre id="out">…waiting for a pick…</pre>
  </main>

  <!-- No build step: load straight from the CDN. -->
  <script type="module" src="https://cdn.jsdelivr.net/npm/@planetlogin/planetlogin"></script>
  <script>
    document.querySelector('planet-login').addEventListener('locale', (e) => {
      document.getElementById('out').textContent = JSON.stringify(e.detail, null, 2);
    });
  </script>
</body>
</html>
