<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>PlanetLogin — component demo</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'><path fill='%23f6a13c' d='M17.9 17.39c-.26-.8-1.01-1.39-1.9-1.39h-1v-3a1 1 0 0 0-1-1H8v-2h2a1 1 0 0 0 1-1V7h2a2 2 0 0 0 2-2v-.41A7.984 7.984 0 0 1 20 12c0 2.08-.81 3.98-2.1 5.39M11 19.93C7.05 19.44 4 16.08 4 12c0-.62.08-1.21.21-1.79L9 15v1a2 2 0 0 0 2 2m1-16A10 10 0 0 0 2 12a10 10 0 0 0 10 10a10 10 0 0 0 10-10A10 10 0 0 0 12 2'/></svg>">
<style>
  :root{ --accent:#f6a13c; --surface:#0d1422; --line:rgba(255,255,255,.12); --muted:#9aa7bd }
  *{box-sizing:border-box} html,body{height:100%;margin:0}
  body{background:#070b16;color:#eef2fb;font-family:system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;overflow:hidden}
  .stage{display:flex;height:100vh}
  planet-login{flex:1 1 auto;min-width:0;height:100vh}
  .panel{flex:0 0 380px;max-width:42vw;background:var(--surface);border-left:1px solid var(--line);
    display:grid;place-items:center;padding:2rem}
  .card{width:100%;max-width:300px}
  h1{font-size:1.05rem;margin:0 0 .2rem} .sub{color:var(--muted);font-size:.85rem;margin:0 0 1.3rem}
  label{display:block;font-size:.78rem;color:var(--muted);margin:.8rem 0 .3rem}
  input{width:100%;background:#131c2e;border:1px solid var(--line);border-radius:10px;padding:.6rem .7rem;
    color:#eef2fb;font-size:.95rem}
  button{width:100%;margin-top:1rem;border:0;border-radius:11px;padding:.7rem;font-weight:700;
    background:var(--accent);color:#231400;cursor:pointer}
  .chips{display:flex;gap:.4rem;flex-wrap:wrap;margin-top:1.2rem;font-size:.72rem}
  .chip{background:rgba(255,255,255,.08);border:1px solid var(--line);border-radius:999px;padding:.2rem .6rem}
  .chip b{color:var(--accent)}
  pre{margin-top:1rem;font-size:.7rem;color:var(--muted);white-space:pre-wrap;word-break:break-all}
  @media(max-width:820px){.stage{flex-direction:column}planet-login{flex:none;height:50vh}.panel{max-width:none;border-left:0;border-top:1px solid var(--line)}}
</style>
</head>
<body>
<div class="stage">
  <planet-login accent="#f6a13c"></planet-login>
  <aside class="panel">
    <div class="card">
      <h1 id="greet">Sign in</h1>
      <p class="sub" id="sub">Pick a place on the globe — this panel localizes live.</p>
      <label id="l-email">Email</label>
      <input type="email" placeholder="you@email.com">
      <label id="l-pass">Password</label>
      <input type="password" placeholder="••••••••">
      <button id="cta">Sign in</button>
      <div class="chips" id="chips"></div>
      <pre id="out"></pre>
    </div>
  </aside>
</div>

<script type="module">
  import './src/index.ts';   // registers <planet-login>

  // tiny demo i18n to show the panel switching language on locale change
  const T = {
    en:{greet:'Hello',cta:'Sign in',email:'Email',pass:'Password'},
    es:{greet:'Hola',cta:'Entrar',email:'Email',pass:'Contraseña'},
    fr:{greet:'Bonjour',cta:'Se connecter',email:'E-mail',pass:'Mot de passe'},
    de:{greet:'Hallo',cta:'Anmelden',email:'E-Mail',pass:'Passwort'},
    it:{greet:'Ciao',cta:'Accedi',email:'Email',pass:'Password'},
    pt:{greet:'Olá',cta:'Entrar',email:'Email',pass:'Senha'},
    ja:{greet:'こんにちは',cta:'ログイン',email:'メール',pass:'パスワード'},
    zh:{greet:'你好',cta:'登录',email:'邮箱',pass:'密码'},
  };
  const $ = (id) => document.getElementById(id);
  document.querySelector('planet-login').addEventListener('locale', (e) => {
    const loc = e.detail; const t = T[loc.language] || T.en;
    document.documentElement.lang = loc.language;
    $('greet').textContent = t.greet;
    $('cta').textContent = t.cta;
    $('l-email').textContent = t.email;
    $('l-pass').textContent = t.pass;
    $('chips').innerHTML =
      `<span class="chip">${loc.label}</span>`+
      `<span class="chip"><b>${loc.timezone}</b></span>`+
      `<span class="chip"><b>${loc.language}</b></span>`;
    $('out').textContent = JSON.stringify(loc, null, 2);
  });
</script>
</body>
</html>
